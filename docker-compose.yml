version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - api-uploads:/app/apps/api/uploads
      - ./apps/api/firebase-service-account.json:/app/apps/api/firebase-service-account.json:ro
      - ./apps/api/prompts.secret.json:/app/apps/api/prompts.secret.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  api-uploads:
